<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>404 — The Ledger</title>
    <script>
    (function(){
        var t = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = t === 'light' ? '#F7F9FC' : '#000000';
    })();
    </script>
    <style>
        :root[data-theme="dark"] {
            --bg: #000; --text: #f5f5f7; --text-muted: rgba(255,255,255,0.5);
        }
        :root[data-theme="light"] {
            --bg: #f4f6f9; --text: #1d1d1f; --text-muted: rgba(0,0,0,0.45);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 2rem;
        }
        .error-wrap { max-width: 360px; }
        .error-code { font-size: 4rem; font-weight: 800; margin-bottom: 0.4rem; opacity: 0.3; }
        .error-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.6rem; }
        .error-msg { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1.8rem; }
        .error-btn {
            display: inline-block; padding: 0.6rem 1.6rem; border-radius: 10px;
            font-size: 0.88rem; font-weight: 600; cursor: pointer;
            background: #003eb6; color: #fff; border: none;
            text-decoration: none; transition: opacity 0.15s;
        }
        .error-btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="error-wrap">
        <div class="error-code">404</div>
        <div class="error-title">Page Not Found</div>
        <p class="error-msg">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="error-btn">Go to Dashboard</a>
    </div>
</body>
</html>
