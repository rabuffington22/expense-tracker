{% extends "base.html" %}
{% block title %}{{ entity_display }} Dashboard — Ledger Oak{% endblock %}

{% block content %}
<h1 class="page-title">{{ entity_display }} Dashboard</h1>

<!-- Filter bar (outside HTMX target — always visible) -->
<div class="card txn-filter-bar dhdr-bar">
  <form id="dash-filter-form"
        hx-get="{{ url_for('dashboard.partial') }}"
        hx-target="#dashboard-body"
        hx-swap="innerHTML"
        hx-push-url="true">

    <!-- Primary control row -->
    <div class="dhdr-row">
      <!-- Date range pill -->
      <div class="dhdr-date-pill">
        <input type="date" id="start" name="start" value="{{ params.start }}" class="dhdr-date-input">
        <span class="dhdr-date-sep" aria-hidden="true"></span>
        <input type="date" id="end" name="end" value="{{ params.end }}" class="dhdr-date-input">
      </div>

      <!-- Account pill -->
      <select id="account" name="account" class="dhdr-pill">
        <option value="">All Accounts</option>
        {% for acct in accounts %}
        <option value="{{ acct }}" {% if params.account == acct %}selected{% endif %}>{{ acct }}</option>
        {% endfor %}
      </select>

      <!-- Saved Views group -->
      <div class="dhdr-sv-group">
        <select id="sv-select-dashboard" class="dhdr-pill"
                onchange="svLoad('dashboard', this)">
          <option value="" selected disabled>Saved Views</option>
        </select>
        <button type="button" class="dhdr-sv-btn" onclick="svSave('dashboard')">Save</button>
        <button type="button" class="dhdr-sv-btn" id="sv-update-btn-dashboard"
                onclick="svUpdate('dashboard')" disabled style="opacity:0.4;">Update</button>
        <div class="sv-menu-wrap">
          <button type="button" class="dhdr-sv-btn sv-menu-trigger"
                  id="sv-more-btn-dashboard"
                  onclick="svToggleMenu('dashboard')"
                  aria-haspopup="true" aria-expanded="false"
                  disabled style="opacity:0.4;">&#x22EF;</button>
          <div class="sv-menu" id="sv-menu-dashboard" role="menu">
            <button type="button" role="menuitem" class="sv-menu-item"
                    id="sv-rename-btn-dashboard"
                    onclick="svRename('dashboard'); svCloseMenus();">Rename</button>
            <button type="button" role="menuitem" class="sv-menu-item"
                    id="sv-default-btn-dashboard"
                    onclick="svSetDefault('dashboard'); svCloseMenus();">Make Default</button>
            <button type="button" role="menuitem" class="sv-menu-item"
                    id="sv-cleardefault-btn-dashboard"
                    onclick="svClearDefault('dashboard'); svCloseMenus();"
                    style="display:none;">Clear Default</button>
            <hr class="sv-menu-divider">
            <button type="button" role="menuitem" class="sv-menu-item sv-menu-item--danger"
                    id="sv-delete-btn-dashboard"
                    onclick="svDelete('dashboard'); svCloseMenus();">Delete</button>
          </div>
        </div>
      </div>

      <!-- Spacer pushes actions right -->
      <div class="dhdr-spacer"></div>

      <!-- Actions -->
      <button type="submit" class="btn btn-primary btn-sm">Apply</button>
      <button type="button" class="dhdr-clear"
              onclick="window.location.href='{{ url_for('dashboard.index') }}'">Clear</button>
    </div>

    <!-- Toggle chips (subtle second line) -->
    <div class="dhdr-chips">
      <label class="txn-chip {% if params.uncategorized == '1' %}active{% endif %}">
        <input type="checkbox" name="uncategorized" value="1" {% if params.uncategorized == '1' %}checked{% endif %} hidden>
        <span>Uncategorized</span>
      </label>
      <label class="txn-chip {% if params.vendor_breakdown == '1' %}active{% endif %}">
        <input type="checkbox" name="vendor_breakdown" value="1" {% if params.vendor_breakdown == '1' %}checked{% endif %} hidden>
        <span>Vendor Needed</span>
      </label>
      <label class="txn-chip {% if params.possible_transfer == '1' %}active{% endif %}">
        <input type="checkbox" name="possible_transfer" value="1" {% if params.possible_transfer == '1' %}checked{% endif %} hidden>
        <span>Transfers</span>
      </label>
      <label class="txn-chip {% if params.include_transfers == '1' %}active{% endif %}">
        <input type="checkbox" name="include_transfers" value="1" {% if params.include_transfers == '1' %}checked{% endif %} hidden>
        <span>Include Transfers</span>
      </label>
    </div>
  </form>
</div>

<!-- Results container — HTMX swap target -->
<div id="dashboard-body" class="dash-body">
  {% include "components/dashboard_body.html" %}
</div>

<script>
/* Toggle chip state on click */
document.querySelectorAll('#dash-filter-form .txn-chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
        var input = this.querySelector('input');
        if (input.type === 'radio') {
            if (this.classList.contains('active')) {
                input.checked = false;
                this.classList.remove('active');
                document.querySelectorAll('#dash-filter-form input[name="' + input.name + '"]').forEach(function(r) {
                    r.checked = false;
                    r.closest('.txn-chip').classList.remove('active');
                });
            } else {
                document.querySelectorAll('#dash-filter-form input[name="' + input.name + '"]').forEach(function(r) {
                    r.checked = false;
                    r.closest('.txn-chip').classList.remove('active');
                });
                input.checked = true;
                this.classList.add('active');
            }
        } else {
            input.checked = !input.checked;
            this.classList.toggle('active', input.checked);
        }
    });
});

/* ── Loading indicator for HTMX swaps ─────────────────────────────────── */
document.body.addEventListener('htmx:beforeRequest', function(e) {
    if (e.detail.target && e.detail.target.id === 'dashboard-body') {
        e.detail.target.classList.add('dash-loading');
    }
});
document.body.addEventListener('htmx:afterRequest', function(e) {
    if (e.detail.target && e.detail.target.id === 'dashboard-body') {
        e.detail.target.classList.remove('dash-loading');
    }
});
document.body.addEventListener('htmx:responseError', function(e) {
    if (e.detail.target && e.detail.target.id === 'dashboard-body') {
        e.detail.target.classList.remove('dash-loading');
    }
});
</script>
{% endblock %}
