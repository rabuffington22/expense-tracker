<!DOCTYPE html>
<html lang="en" data-theme="dark" class="standalone-login-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Sign in — The Ledger</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" sizes="any">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="standalone-login">
    <main class="standalone-login-card">
        <img src="{{ url_for('static', filename='the-ledger-logo-lockup.png') }}" alt="The Ledger">
        <h1>Welcome back</h1>
        <p>Enter your password to continue.</p>
        <form method="post" action="{{ url_for('_auth_login') }}">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="next" value="{{ next_path }}">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required autofocus>
            <button type="submit">Sign in</button>
            <div class="standalone-login-error" role="alert">{{ error or '' }}</div>
        </form>
    </main>
</body>
</html>
