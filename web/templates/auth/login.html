<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Sign in — The Ledger</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" sizes="any">
    <style>
        :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        * { box-sizing: border-box; }
        body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 24px; background: linear-gradient(180deg, #000 0%, #0a0a0a 50%, #000 100%); color: #f5f5f7; }
        main { width: min(100%, 360px); padding: 40px 36px; text-align: center; background: rgba(28,28,30,.95); border: 1px solid rgba(255,255,255,.12); border-radius: 20px; box-shadow: 0 24px 80px rgba(0,0,0,.9), 0 0 0 1px rgba(255,255,255,.05) inset; }
        img { width: min(220px, 100%); height: auto; margin-bottom: 24px; }
        h1 { margin: 0 0 8px; font-size: 28px; color: #2f7bff; letter-spacing: -.5px; }
        p { margin: 0 0 28px; color: #a1a1a6; font-size: 14px; }
        label { display: block; margin-bottom: 8px; text-align: left; color: #d1d1d6; font-size: 13px; }
        input { width: 100%; padding: 14px 16px; color: #f5f5f7; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 12px; font: inherit; outline: none; }
        input:focus { border-color: #2f7bff; box-shadow: 0 0 0 3px rgba(47,123,255,.2); }
        button { width: 100%; margin-top: 14px; padding: 14px; color: #fff; background: #2f7bff; border: 0; border-radius: 12px; font: inherit; font-weight: 600; cursor: pointer; }
        .error { min-height: 18px; margin: 12px 0 0; color: #ff6961; font-size: 13px; }
    </style>
</head>
<body>
    <main>
        <img src="{{ url_for('static', filename='the-ledger-logo-lockup.png') }}" alt="The Ledger">
        <h1>Welcome back</h1>
        <p>Enter your password to continue.</p>
        <form method="post" action="{{ url_for('_auth_login') }}">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="next" value="{{ next_path }}">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required autofocus>
            <button type="submit">Sign in</button>
            <div class="error" role="alert">{{ error or '' }}</div>
        </form>
    </main>
</body>
</html>
