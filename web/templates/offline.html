<!DOCTYPE html>
<html lang="en" data-theme="dark" class="standalone-message-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Offline — The Ledger</title>
    <script src="{{ url_for('static', filename='standalone-documents.js') }}?v={{ cache_bust }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="standalone-message standalone-message--offline">
    <div class="offline-wrap">
        <div class="offline-icon">&#x1F50C;</div>
        <div class="offline-title">You're Offline</div>
        <p class="offline-msg">The Ledger needs an internet connection to load your financial data. Please check your connection and try again.</p>
        <button class="offline-btn" data-standalone-action="retry">Retry</button>
    </div>
</body>
</html>
