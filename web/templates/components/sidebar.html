<nav class="sidebar" aria-label="Main navigation" style="--sb-accent: {{ accent }};">
    <!-- Brand -->
    <div class="sb-brand">
        <div class="sb-brand-icon-wrap" onclick="this.classList.toggle('sb-heath-open')">
            <div class="sb-brand-icon-flip">
                <img src="{{ url_for('static', filename='ledger-ai-icon.png') }}" alt="The Ledger" class="sb-brand-icon">
                <img src="{{ url_for('static', filename='heath-standing.png') }}" alt="" class="sb-heath-img">
            </div>
        </div>
    </div>

    <div class="sb-divider"></div>

    <!-- Entity Toggle -->
    <div class="sb-entity">
        {% for ent in entities %}
        <form method="post" action="{{ url_for('set_entity') }}">
            <input type="hidden" name="entity" value="{{ ent }}">
            <input type="hidden" name="redirect" value="{{ request.path }}">
            <button type="submit" class="{% if entity_display == ent %}active{% endif %}">{{ ent }}</button>
        </form>
        {% endfor %}
    </div>

    <div class="sb-divider"></div>

    <!-- Primary nav -->
    <div class="sb-nav">
        <a href="{{ url_for('dashboard.index') }}" class="sb-link {% if request.path == '/' %}active{% endif %}">Dashboard</a>
        <a href="{{ url_for('todo.index') }}" class="sb-link {% if request.path.startswith('/todo') %}active{% endif %}">To Do</a>
        {% if entity_key != 'luxelegacy' %}
        <a href="{{ url_for('weekly.index') }}" class="sb-link {% if request.path.startswith('/weekly') %}active{% endif %}">Weekly</a>
        {% endif %}
        <a href="{{ url_for('cashflow.index') }}" class="sb-link {% if request.path.startswith('/cashflow') %}active{% endif %}">Cash Flow</a>
        {% if entity_key != 'luxelegacy' %}
        <a href="{{ url_for('short_term_planning.index') }}" class="sb-link {% if request.path.startswith('/planning/short-term') %}active{% endif %}">Short-Term Planning</a>
        <a href="{{ url_for('planning.index') }}" class="sb-link {% if request.path == '/planning/' or request.path == '/planning' %}active{% endif %}">Long-Term Planning</a>
        {% endif %}
        {% if entity_key == 'company' %}
        <a href="{{ url_for('payroll.index') }}" class="sb-link {% if request.path.startswith('/payroll') %}active{% endif %}">Payroll</a>
        {% endif %}
        <a href="{{ url_for('transactions.index') }}" class="sb-link {% if request.path.startswith('/transactions') %}active{% endif %}">Transactions</a>
        <a href="{{ url_for('reports.index') }}" class="sb-link {% if request.path.startswith('/reports') %}active{% endif %}">Reports</a>
    </div>

    <!-- Bottom actions (pushed to bottom via margin-top: auto) -->
    <div class="sb-bottom">
        <a href="{{ url_for('plaid.index') }}" class="sb-bottom-btn{% if request.path.startswith('/plaid') %} active{% endif %}" aria-label="Connected Accounts">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        </a>
        <button type="button" class="sb-bottom-btn" onclick="toggleTheme()" aria-label="Toggle theme">
            <span class="theme-toggle-icon">&#x263E;</span>
        </button>
    </div>
</nav>
