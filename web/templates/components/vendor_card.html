{% if done is defined and done %}
<div class="alert alert-success">{{ message }}</div>
<a href="{{ url_for('match.index') }}" class="btn btn-primary">Go to Match &rarr;</a>

{% elif empty is defined and empty %}
<div class="alert alert-info">{{ message }}</div>
<a href="{{ url_for('vendors.index') }}" class="btn btn-primary">Go to Vendors &rarr;</a>

{% else %}
<p class="mb-1"><strong>{{ total }} orders</strong> need categorization.</p>

<div class="progress-bar mb-1">
    <div class="progress-fill" style="width: 0%;"></div>
</div>

<div class="card">
    <h3>{{ order.product_summary[:120] }}</h3>
    <p class="text-muted text-sm">{{ order.order_date }} &middot; <strong>${{ "{:,.2f}".format(order.order_total) }}</strong></p>

    <form hx-post="{{ url_for('categorize_vendors.save') }}"
          hx-target="#card-container"
          hx-swap="innerHTML"
          style="margin-top: 1rem;">
        <input type="hidden" name="order_id" value="{{ order.id }}">

        <div class="form-row">
            <div class="form-group">
                <label>Category</label>
                <select name="category"
                        hx-get="{{ url_for('categorize_vendors.subcategories') }}"
                        hx-target="#sub-select"
                        hx-swap="innerHTML"
                        hx-include="[name='category']"
                        hx-trigger="change">
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if cat == inferred_cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Subcategory</label>
                <select name="subcategory" id="sub-select">
                    {% for sub in subcategories %}
                    <option value="{{ sub }}" {% if sub == inferred_sub %}selected{% endif %}>{{ sub }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Or new subcategory</label>
            <input type="text" name="custom_sub" placeholder="Type to create new...">
        </div>

        <div class="form-row">
            <button type="submit" class="btn btn-primary btn-full">Save</button>
            <button type="button" class="btn btn-secondary btn-full"
                    hx-post="{{ url_for('categorize_vendors.skip') }}"
                    hx-target="#card-container"
                    hx-swap="innerHTML"
                    hx-vals='{"order_id": "{{ order.id }}"}'>Skip</button>
        </div>
    </form>
</div>
{% endif %}
