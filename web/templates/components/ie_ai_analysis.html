<div class="iu-half-label iu-ai-label">AI Analysis</div>
{% if insights %}
  {% for ins in insights %}
  <div class="iu-row iu-ai-row iu-ai-row--expandable" data-fragment-action="toggle-ai">
    <span class="iu-text iu-ai-summary">{{ ins.text | truncate(60, True, '...') }}</span>
    <span class="iu-chevron">&#x203A;</span>
  </div>
  <div class="iu-ai-detail" hidden>
    <span class="iu-text">{{ ins.text }}</span>
  </div>
  {% endfor %}
{% else %}
  <div class="iu-empty-sm">AI analysis unavailable</div>
{% endif %}
