<div class="kpi-panel" id="kpi-{{ panel }}">
  <div class="kpi-panel-header">
    <select class="kpi-period-select"
            name="period"
            hx-get="{{ url_for('dashboard.kpi_panel') }}"
            hx-vals='{"panel": "{{ panel }}"}'
            hx-target="#kpi-{{ panel }}"
            hx-swap="outerHTML">
      {% set ns = namespace(in_months=false) %}
      {% for key, label in period_labels.items() %}
        {% if key.startswith('month_') and not ns.in_months %}
          {% set ns.in_months = true %}
      <option disabled>──────────</option>
        {% endif %}
      <option value="{{ key }}" {% if key == period %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="kpi-panel-grid">
    <!-- Spending -->
    <a class="kpi-panel-cell" href="{{ drill_url(type='expense') }}">
      <div class="kpi-panel-label">{{ entity_labels.spend }}</div>
      <div class="kpi-panel-value">${{ "{:,.0f}".format(spend_cents / 100) }}</div>
    </a>
    <!-- Income -->
    <a class="kpi-panel-cell" href="{{ drill_url(type='income') }}">
      <div class="kpi-panel-label">{{ entity_labels.income }}</div>
      <div class="kpi-panel-value kpi-pos">${{ "{:,.0f}".format(income_cents / 100) }}</div>
    </a>
    <!-- Net -->
    <div class="kpi-panel-cell kpi-panel-cell--static kpi-panel-cell--net">
      <div class="kpi-panel-label">{{ entity_labels.net }}</div>
      <div class="kpi-panel-value {% if net_cents < 0 %}kpi-neg{% else %}kpi-pos{% endif %}">
        {{ "\u2212" if net_cents < 0 else "" }}${{ "{:,.0f}".format((net_cents|abs) / 100) }}
      </div>
    </div>
  </div>
</div>
<script>
/* After HTMX swaps in a KPI panel, refresh dependent sections.
   Each panel type only handles its own logic (scoped by template var). */
(function() {
{% if panel == 'detail' %}
  /* ── Detail panel: fetch single-period categories + insights ─────────── */
  /* Stagger requests to avoid HTMX dropping simultaneous ajax calls
     that fire from within a post-swap script context. */
  setTimeout(function() {
    var detailSel = document.querySelector('#kpi-detail .kpi-period-select');
    if (!detailSel) return;
    var period = encodeURIComponent(detailSel.value);
    var catUrl = '{{ url_for("dashboard.detail_categories") }}' + '?period=' + period;
    var insUrl = '{{ url_for("dashboard.detail_insights") }}' + '?period=' + period;

    htmx.ajax('GET', catUrl, {target: '#detail-categories', swap: 'innerHTML'});
    setTimeout(function() {
      htmx.ajax('GET', insUrl, {target: '#detail-insights', swap: 'innerHTML'});
    }, 50);
    setTimeout(function() {
      var ieUrl = '{{ url_for("dashboard.ie_insights") }}' + '?period=' + period;
      htmx.ajax('GET', ieUrl, {target: '#ie-insights', swap: 'innerHTML'});
    }, 100);
  }, 0);
{% else %}
  /* ── Compare panels: wait for both left+right, then fetch compare data ─ */
  var leftSel  = document.querySelector('#kpi-left .kpi-period-select');
  var rightSel = document.querySelector('#kpi-right .kpi-period-select');
  if (!leftSel || !rightSel) return;

  var lp = encodeURIComponent(leftSel.value);
  var rp = encodeURIComponent(rightSel.value);

  var catUrl = '{{ url_for("dashboard.categories_compare") }}'
             + '?left_period=' + lp + '&right_period=' + rp;
  htmx.ajax('GET', catUrl, {target: '#categories-compare', swap: 'innerHTML'});

  setTimeout(function() {
    var iuTarget = document.getElementById('insights-upcoming');
    if (iuTarget) {
      var iuUrl = '{{ url_for("dashboard.insights_upcoming") }}'
                + '?left_period=' + lp + '&right_period=' + rp;
      htmx.ajax('GET', iuUrl, {target: '#insights-upcoming', swap: 'innerHTML'});
    }
  }, 50);

  setTimeout(function() {
    var ieTarget = document.getElementById('ie-insights');
    if (ieTarget) {
      var ieUrl = '{{ url_for("dashboard.ie_insights") }}'
                + '?left_period=' + lp + '&right_period=' + rp;
      htmx.ajax('GET', ieUrl, {target: '#ie-insights', swap: 'innerHTML'});
    }
  }, 100);
{% endif %}
})();
</script>
