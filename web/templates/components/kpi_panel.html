<div class="kpi-panel" id="kpi-{{ panel }}">
  <div class="kpi-panel-header">
    <select class="kpi-period-select"
            name="period"
            hx-get="{{ url_for('dashboard.kpi_panel') }}"
            hx-vals='{"panel": "{{ panel }}"}'
            hx-target="#kpi-{{ panel }}"
            hx-swap="outerHTML">
      {% set ns = namespace(in_months=false) %}
      {% for key, label in period_labels.items() %}
        {% if key.startswith('month_') and not ns.in_months %}
          {% set ns.in_months = true %}
      <option disabled>──────────</option>
        {% endif %}
      <option value="{{ key }}" {% if key == period %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="kpi-panel-grid">
    <!-- Spending -->
    <a class="kpi-panel-cell" href="{{ drill_url(type='expense') }}">
      <div class="kpi-panel-label">{{ entity_labels.spend }}</div>
      <div class="kpi-panel-value">${{ "{:,.0f}".format(spend_cents / 100) }}</div>
    </a>
    <!-- Income -->
    <a class="kpi-panel-cell" href="{{ drill_url(type='income') }}">
      <div class="kpi-panel-label">{{ entity_labels.income }}</div>
      <div class="kpi-panel-value kpi-pos">${{ "{:,.0f}".format(income_cents / 100) }}</div>
    </a>
    <!-- Net -->
    <div class="kpi-panel-cell kpi-panel-cell--static kpi-panel-cell--net">
      <div class="kpi-panel-label">{{ entity_labels.net }}</div>
      <div class="kpi-panel-value {% if net_cents < 0 %}kpi-neg{% else %}kpi-pos{% endif %}">
        {{ "\u2212" if net_cents < 0 else "" }}${{ "{:,.0f}".format((net_cents|abs) / 100) }}
      </div>
    </div>
  </div>
</div>
<script>
/* After HTMX swaps in a KPI panel, refresh dependent sections if both
   panels are in the DOM. First panel load: other panel won't exist yet
   (skip). Second panel load: both exist, trigger fetches. Any
   subsequent dropdown change also fires this. */
(function() {
  var leftSel  = document.querySelector('#kpi-left .kpi-period-select');
  var rightSel = document.querySelector('#kpi-right .kpi-period-select');
  if (!leftSel || !rightSel) return;

  /* Categories comparison */
  var catUrl = '{{ url_for("dashboard.categories_compare") }}'
             + '?left_period=' + encodeURIComponent(leftSel.value)
             + '&right_period=' + encodeURIComponent(rightSel.value);
  htmx.ajax('GET', catUrl, {target: '#categories-compare', swap: 'innerHTML'});

  /* Insights + Upcoming (uses both periods for left/right/compare) */
  var iuTarget = document.getElementById('insights-upcoming');
  if (iuTarget) {
    var iuUrl = '{{ url_for("dashboard.insights_upcoming") }}'
              + '?left_period=' + encodeURIComponent(leftSel.value)
              + '&right_period=' + encodeURIComponent(rightSel.value);
    htmx.ajax('GET', iuUrl, {target: '#insights-upcoming', swap: 'innerHTML'});
  }
})();
</script>
