<div class="txn-modal-backdrop" onclick="if(event.target===this)this.parentElement.innerHTML=''">
  <div class="txn-modal-card">
    <div class="txn-modal-header">
      <div>
        <div class="txn-modal-merchant">{{ txn.merchant_canonical or (txn.description_raw[:60] if txn.description_raw else '—') }}</div>
        <div class="txn-modal-meta">{{ fmt_date(txn.date) }} · {{ fmt_cents(txn.amount_cents) }}</div>
      </div>
      <button type="button" class="btn-icon" onclick="document.getElementById('txn-modal').innerHTML=''" title="Close">&#10005;</button>
    </div>

    <form class="txn-modal-form"
          hx-post="{{ url_for('transactions.update', txn_id=txn.transaction_id) }}"
          hx-target="#txn-{{ txn.transaction_id }}"
          hx-swap="outerHTML"
          hx-on::after-request="document.getElementById('txn-modal').innerHTML=''">

      <label class="text-xs text-muted">Category</label>
      <select name="category" class="input-sm txn-edit-cat"
              onchange="txnLoadSubcats(this, '{{ txn.transaction_id }}')">
        {% for cat in categories %}
        <option value="{{ cat }}" {% if cat == (txn.category or '') %}selected{% endif %}>{{ cat }}</option>
        {% endfor %}
      </select>

      <label class="text-xs text-muted">Subcategory</label>
      <select name="subcategory" class="input-sm"
              id="txn-subcat-{{ txn.transaction_id }}"
              data-current="{{ txn.subcategory or '' }}">
        {% for sub in subcategories %}
        <option value="{{ sub }}" {% if sub == (txn.subcategory or 'Unknown') %}selected{% endif %}>{{ sub }}</option>
        {% endfor %}
      </select>

      <label class="text-xs text-muted">Notes</label>
      <input type="text" name="notes" class="input-sm" placeholder="Notes..."
             value="{{ txn.notes or '' }}">

      <div class="txn-modal-actions">
        <button type="submit" class="btn btn-primary btn-sm">Save</button>
        <button type="button" class="btn btn-secondary btn-sm"
                id="txn-suggest-{{ txn.transaction_id }}"
                onclick="txnSuggestCategory('{{ txn.transaction_id }}')">AI Suggest</button>
        <button type="button" class="btn btn-secondary btn-sm"
                hx-post="{{ url_for('transactions.create_rule', txn_id=txn.transaction_id) }}"
                hx-target="#txn-{{ txn.transaction_id }}"
                hx-swap="outerHTML"
                hx-on::after-request="document.getElementById('txn-modal').innerHTML=''">+ Rule</button>
      </div>
    </form>
  </div>
</div>
