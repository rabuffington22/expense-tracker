<tr id="txn-{{ txn.transaction_id }}" class="txn-editing">
  <td class="text-sm">{{ fmt_date(txn.date) }}</td>
  <td class="text-sm">
    {{ txn.merchant_canonical or (txn.description_raw[:55] if txn.description_raw else '—') }}
  </td>
  <td class="text-sm text-right" style="{% if txn.amount_cents and txn.amount_cents > 0 %}color:var(--green);{% endif %}">
    {{ fmt_cents(txn.amount_cents) }}
  </td>
  <td colspan="2">
    <form class="txn-edit-form"
          hx-post="{{ url_for('transactions.update', txn_id=txn.transaction_id) }}"
          hx-target="#txn-{{ txn.transaction_id }}"
          hx-swap="outerHTML">

      <div class="txn-edit-fields">
        <select name="category" class="input-sm txn-edit-cat"
                onchange="txnLoadSubcats(this, '{{ txn.transaction_id }}')">
          {% for cat in categories %}
          <option value="{{ cat }}" {% if cat == (txn.category or '') %}selected{% endif %}>{{ cat }}</option>
          {% endfor %}
        </select>

        <select name="subcategory" class="input-sm"
                id="txn-subcat-{{ txn.transaction_id }}"
                data-current="{{ txn.subcategory or '' }}">
          {% for sub in subcategories %}
          <option value="{{ sub }}" {% if sub == (txn.subcategory or 'Unknown') %}selected{% endif %}>{{ sub }}</option>
          {% endfor %}
        </select>

        <input type="text" name="notes" class="input-sm" placeholder="Notes..."
               value="{{ txn.notes or '' }}" style="min-width:100px;">
      </div>

      <div class="txn-edit-actions">
        <button type="submit" class="btn btn-primary btn-sm">Save</button>
        <button type="button" class="btn btn-secondary btn-sm"
                hx-post="{{ url_for('transactions.mark_transfer', txn_id=txn.transaction_id) }}"
                hx-target="#txn-{{ txn.transaction_id }}"
                hx-swap="outerHTML"
                hx-confirm="Mark as Internal Transfer?"
                title="Mark as transfer">Transfer</button>
        <button type="button" class="btn btn-secondary btn-sm"
                hx-post="{{ url_for('transactions.create_rule', txn_id=txn.transaction_id) }}"
                hx-target="#txn-{{ txn.transaction_id }}"
                hx-swap="outerHTML"
                title="Create merchant alias rule">+ Rule</button>
        <button type="button" class="btn-icon"
                hx-get="{{ url_for('transactions.view_row', txn_id=txn.transaction_id) }}"
                hx-target="#txn-{{ txn.transaction_id }}"
                hx-swap="outerHTML"
                title="Cancel">&#10005;</button>
      </div>
    </form>
  </td>
</tr>
