{% extends "base.html" %}
{% block title %}Transactions — Ledger Oak{% endblock %}

{% block content %}
<div class="page-title-row">
  <h1 class="page-title">Transactions</h1>
  <button type="button" class="btn btn-primary btn-sm pl-btn-ask" onclick="aiChatOpen('transactions')">Ask Opus</button>
</div>

<!-- Filter bar (outside HTMX target — always visible) -->
<div class="outline-panel txn-filter-bar">
  <form id="txn-filter-form"
        hx-get="{{ url_for('transactions.partial') }}"
        hx-target="#txn-results"
        hx-swap="innerHTML"
        hx-push-url="true">

    <!-- Single row: filters (fixed) + search (fills remaining) -->
    <div class="form-row">
      <div class="form-group" style="flex:0 0 105px;">
        <label class="text-xs text-muted" for="start">From</label>
        <input type="date" id="start" name="start" value="{{ params.start }}" class="input-sm" style="width:100%;">
      </div>
      <div class="form-group" style="flex:0 0 105px;">
        <label class="text-xs text-muted" for="end">To</label>
        <input type="date" id="end" name="end" value="{{ params.end }}" class="input-sm" style="width:100%;">
      </div>
      <div class="form-group" style="flex:0 0 140px;">
        <label class="text-xs text-muted" for="category_id">Category</label>
        <select id="category_id" name="category_id" class="input-sm" style="width:100%;"
                onchange="txnFilterSubcats()">
          <option value="">All</option>
          {% for cat in categories %}
          <option value="{{ cat.id }}" {% if params.category_id == cat.id|string %}selected{% endif %}>{{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group" style="flex:0 0 140px;">
        <label class="text-xs text-muted" for="subcategory">Subcategory</label>
        <select id="subcategory" name="subcategory" class="input-sm" style="width:100%;"
                data-current="{{ params.subcategory }}">
          <option value="">All</option>
        </select>
      </div>
      <div class="form-group" style="flex:0 0 130px;">
        <label class="text-xs text-muted" for="account">Account</label>
        <select id="account" name="account" class="input-sm" style="width:100%;">
          <option value="">All</option>
          {% for acct in accounts %}
          <option value="{{ acct }}" {% if params.account == acct %}selected{% endif %}>{{ acct }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group" style="flex:1 1 auto;align-self:flex-end;">
        <input type="text" id="q" name="q" value="{{ params.q }}" placeholder="Search..." class="input-sm" style="width:100%;">
      </div>
      <div class="form-group" style="flex:0 0 auto;align-self:flex-end;">
        <button type="submit" class="btn btn-primary btn-sm">Apply</button>
      </div>
      <div class="form-group" style="flex:0 0 auto;align-self:flex-end;">
        <a href="{{ url_for('transactions.index') }}" class="btn btn-secondary btn-sm">Clear</a>
      </div>
    </div>

    <!-- Hidden sort fields (updated by JS on column header click) -->
    <input type="hidden" name="sort" id="sort-field" value="{{ params.sort }}">
    <input type="hidden" name="dir" id="dir-field" value="{{ params.dir }}">
  </form>
</div>

<!-- Edit modal container -->
<div id="txn-modal"></div>

<!-- Results container — HTMX swap target (D3) -->
<div id="txn-results">
  {% include "components/txn_results.html" %}
</div>

<script>
/* Column header sort */
function sortBy(col) {
    var sortField = document.getElementById('sort-field');
    var dirField = document.getElementById('dir-field');
    if (sortField.value === col) {
        dirField.value = dirField.value === 'asc' ? 'desc' : 'asc';
    } else {
        sortField.value = col;
        dirField.value = col === 'date' ? 'desc' : 'asc';
    }
    document.getElementById('txn-filter-form').requestSubmit();
}

/* ── Subcategory cascade (shared cache) ────────────────────────────────── */
var _txnSubcatCache = null;

function _txnEscapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
}

function _txnBuildOptions(subs) {
    return subs.map(function(s) {
        var e = _txnEscapeHtml(s);
        return '<option value="' + e + '">' + e + '</option>';
    }).join('');
}

function _ensureCache(cb) {
    if (_txnSubcatCache) { cb(); return; }
    fetch('{{ url_for("transactions.all_subcategories") }}')
        .then(function(r) { return r.json(); })
        .then(function(data) { _txnSubcatCache = data; cb(); });
}

/* Filter bar: cascade subcategory dropdown from category selection */
function txnFilterSubcats() {
    var catSel = document.getElementById('category_id');
    var subSel = document.getElementById('subcategory');
    var catName = catSel.options[catSel.selectedIndex].text;
    if (!catSel.value) {
        subSel.innerHTML = '<option value="">All</option>';
        return;
    }
    _ensureCache(function() {
        var subs = _txnSubcatCache[catName] || [];
        var current = subSel.getAttribute('data-current') || '';
        subSel.innerHTML = '<option value="">All</option>' + subs.map(function(s) {
            var e = _txnEscapeHtml(s);
            var sel = (s === current) ? ' selected' : '';
            return '<option value="' + e + '"' + sel + '>' + e + '</option>';
        }).join('');
    });
}
/* Populate on page load if category is pre-selected */
if (document.getElementById('category_id').value) { txnFilterSubcats(); }

/* Inline edit: cascade subcategory */
function txnLoadSubcats(catSelect, txnId) {
    var cat = catSelect.value;
    var subSelect = document.getElementById('txn-subcat-' + txnId);
    if (!subSelect) return;
    subSelect.setAttribute('data-current', '');
    _ensureCache(function() {
        if (!cat || !_txnSubcatCache[cat]) {
            subSelect.innerHTML = '<option value="Unknown">Unknown</option>';
            return;
        }
        subSelect.innerHTML = _txnBuildOptions(_txnSubcatCache[cat]);
    });
}

/* AI category suggestion */
function txnSuggestCategory(txnId) {
    var btn = document.getElementById('txn-suggest-' + txnId);
    if (!btn) return;
    var origText = btn.textContent;
    btn.textContent = 'Thinking\u2026';
    btn.disabled = true;

    fetch('{{ url_for("transactions.suggest", txn_id="__TXN__") }}'.replace('__TXN__', txnId), {
        method: 'POST'
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.error) {
            btn.textContent = 'No idea';
            btn.disabled = false;
            setTimeout(function() { btn.textContent = origText; }, 1500);
            return;
        }
        /* Set category dropdown */
        var modal = btn.closest('.txn-modal-card');
        var catSelect = modal.querySelector('select[name="category"]');
        if (catSelect && data.category) {
            catSelect.value = data.category;
        }
        /* Cascade subcategories, then set the suggested one */
        var subSelect = document.getElementById('txn-subcat-' + txnId);
        _ensureCache(function() {
            if (data.category && _txnSubcatCache[data.category]) {
                if (subSelect) {
                    subSelect.innerHTML = _txnBuildOptions(_txnSubcatCache[data.category]);
                    if (data.subcategory) {
                        subSelect.value = data.subcategory;
                    }
                }
            }
            btn.textContent = origText;
            btn.disabled = false;
        });
    })
    .catch(function() {
        btn.textContent = 'Error';
        btn.disabled = false;
        setTimeout(function() { btn.textContent = origText; }, 1500);
    });
}
</script>
{% endblock %}
