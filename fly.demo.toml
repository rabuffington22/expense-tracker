# fly.toml — Demo instance (no auth, seed data, 2 entities)
# Deploy: fly deploy --config fly.demo.toml --remote-only

app = 'ledger-oak-demo'
primary_region = 'dfw'

[build]

[env]
  DATA_DIR = '/data'
  FLASK_SECRET = 'demo-ledger-oak-2026'
  ENTITIES = 'Personal:personal,Business:company'

[[mounts]]
  source = 'ledger_oak_demo_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
