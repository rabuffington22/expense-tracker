# fly.toml app configuration file generated for ledger-ai on 2026-03-02T10:47:48-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ledger-oak'
primary_region = 'dfw'

[build]

[env]
  DATA_DIR = '/data'
  # FLASK_SECRET must be set via `fly secrets set FLASK_SECRET=<value>`
  # Do NOT put it here — empty string will cause app to fail to start.

[[mounts]]
  source = 'ledger_oak_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
